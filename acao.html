<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando... - IAprovas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { text-align: center; color: #374151; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #1d4ed8; animation: spin 1s ease infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1 id="action-message">Verificando sua conta...</h1>
        <p id="action-details">Por favor, aguarde. Estamos finalizando seu cadastro.</p>
        <p id="action-error" style="color: #dc2626; margin-top: 20px; display: none;"></p>
    </div>
    <script type="module" src="acao.js"></script>
</body>
</html>
